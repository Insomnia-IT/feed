user nginx;
daemon off;

worker_processes  1;

error_log  /dev/stderr warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  'time="$time_iso8601" remote_addr="$remote_addr" '
                      'method="$request_method" uri="$request_uri" '
                      'status=$status request_time=$request_time '
                      'upstream_response_time="$upstream_response_time" '
                      'upstream_status="$upstream_status" upstream_addr="$upstream_addr" '
                      'bytes_sent=$bytes_sent request_id="$req_id" '
                      'user_agent="$http_user_agent"';

    access_log  /dev/stdout  main;

    sendfile        on;

    keepalive_timeout  65;
    proxy_cache_path /var/cache/cache_5m levels=1:2 keys_zone=cache_5m:10m max_size=30g inactive=5m;
    proxy_cache_key "$scheme$request_method$host$request_uri";
    proxy_cache_valid 5m;
    proxy_cache_valid 404 10s;
    gzip_static  on;

    map $request_uri $cache_5m {
      "~^/$" cache_5m;
      "~^/ru/.*$" cache_5m;
      "~^/api/.*$" cache_5m;
      "~^/landing-assets/.*$" cache_5m;
      "~^/_next/.*$" cache_5m;
      default cache_5m;
    }

    map $http_x_request_id $req_id {
      default $http_x_request_id;
      ""      $request_id;
    }

    map $http_user_agent $outdated {
        default                                 0;
        "~MSIE [0-9]\."                         1;
        "~MSIE 10*"                             1;
        "~rv:11\.0"                             1;
        "~Trident/.*"                           1;
        "~Mozilla.*Firefox/[1-9]\."             1;
        "~Mozilla.*Firefox/[0-8][0-9]\."        1;
        "~Opera.*Version/[0-9]\."               1;
        "~Opera.*Version/[0-8][0-9]\."          1;
        #"~AppleWebKit.*Version/[0-9]\..*Safari" 1;
        "~AppleWebKit/[5-9].*"                  0;
        "~Chrome/[0-7][0-9]\..*MiuiBrowser"     0;
        "~Chrome/[0-9]\."                       1;
        "~Chrome/[0-7][0-9]\."                  1;
    }

    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Request-ID $req_id;
    proxy_set_header Host $http_host;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_redirect off;
    proxy_read_timeout 240s;

    absolute_redirect off;
    port_in_redirect off;

    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Real-Ip;
    real_ip_recursive on;

    server {
        listen 80;

        add_header X-Request-ID $req_id always;

        location = /healthz {
            access_log off;
            default_type text/plain;
            add_header Cache-Control "no-store" always;
            return 200 "ok\n";
        }

        location ~* ^/scanner$ {
            return 302 /scanner/;
        }

        location ~* ^/scanner/$ {
            root /app/packages/scanner/dist;
            index index.html;
            add_header Cache-Control "no-cache" always;
            try_files index.html $uri/index.html;
        }

        location = /scanner/sw.js {
            root /app/packages/scanner/dist;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            try_files /sw.js =404;
        }

        location ~* ^/scanner/(workbox-.*) {
            root /app/packages/scanner/dist;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            try_files /$1 =404;
        }

        location ~* ^/scanner/(assets/.*) {
            root /app/packages/scanner/dist;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            try_files /$1 =404;
        }

        location ~* ^/scanner/(.*) {
            root /app/packages/scanner/dist;
            index index.html;
            add_header Cache-Control "public, max-age=86400" always;
            try_files /$1 404;
        }

        location /feedapi/v1/ {
            add_header Cache-Control "no-store" always;
            proxy_pass http://backend:8000/feedapi/v1/;
        }

        location /admin/ {
            proxy_pass http://backend:8000/admin/;
        }

        location /static/admin/ {
            proxy_pass http://backend:8000/static/admin/;
        }

        location /jaeger/static {
            resolver 127.0.0.11 valid=30s ipv6=off;
            set $jaeger_host "http://jaeger:16686";     
            proxy_pass $jaeger_host$request_uri;
            add_header Cache-Control "public, max-age=604800";
        }

        location /jaeger/ {
            resolver 127.0.0.11 valid=30s ipv6=off;
            set $jaeger_host "http://jaeger:16686";     
            proxy_pass $jaeger_host$request_uri;
        }

        # location /opensearch/ {
        #     proxy_pass http://127.0.0.1:5601/;
        # }

        location = /robots.txt {
            root /app/packages/admin/dist;
            add_header Cache-Control "public, max-age=3600";
            try_files /robots.txt =404;
        }

        location = /registerSW.js {
            root /app/packages/admin/dist;
            add_header Cache-Control "no-cache";
            try_files /registerSW.js =404;
        }

        location ~* ^/assets/.* {
            root /app/packages/admin/dist;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        location ~* ^/workbox-.* {
            root /app/packages/admin/dist;
            add_header Cache-Control "no-cache";
            try_files $uri =404;
        }

        location ~* ^/.*\.(?:png|svg|ico|webmanifest|manifest)$ {
            root /app/packages/admin/dist;
            add_header Cache-Control "public, max-age=86400";
            try_files $uri =404;
        }

        location / {
            root /app/packages/admin/dist;
            index index.html;
            add_header Cache-Control "no-cache";
            try_files $uri /index.html =404;
        }
    }
}
