version: '3.5'
name: feed

services:
  backend:
    networks:
      - internal
    build:
      context: .
      dockerfile: Dockerfile_backend
      args:
        SYNC_URL:
        SYNC_LOGIN:
        SYNC_PASSWORD:
    restart: always
    environment:
      # OTEL_ENDPOINT: http://jaeger:4318/v1/traces
      SKIP_BACK_SYNC: ${SKIP_BACK_SYNC:-False}
      PHOTO_AUTH_TOKEN: ${PHOTO_AUTH_TOKEN}
    volumes:
      - ${DB_DIR:-./db}:/app/db
      - ${PHOTO_STORAGE_PATH:-./db/photos}:/app/photos
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    # depends_on:
    #   - jaeger

  front:
    networks:
      - internal
    build:
      context: .
      dockerfile: ./Dockerfile_front
      args:
        NEW_API_URL: /feedapi/v1
    restart: always
    ports:
      - ${PORT:-80}:80
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

networks:
  internal:
