# version: '3.8'

services:
    tests:
        networks:
            - tests
        environment:
            FEED_APP_HOST: ${FEED_APP_HOST:-https://feedapp-dev.insomniafest.ru}
        build:
            context: .
            network: host
        command: bash -c 'python -m pytest --retries ${NREPS:-1} test_regress.py'

networks:
    tests:

volumes:
    db:
    photos:
