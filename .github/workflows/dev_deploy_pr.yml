name: Deploy to devsrv on PR

on:
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
            - closed
            - converted_to_draft
            - ready_for_review

concurrency:
    group: dev-deploy-pr-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: [self-hosted, insom-devserv]
        environment:
            name: PR-${{ github.event.number }}
            url: ${{ steps.create-link.outputs.app_url }}
        env:
            PROJECT_NAME: feed-pr-${{ github.event.number }}
            DB_DIR: /tmp/feed_db_pr_${{ github.event.number }}
            PHOTO_STORAGE_PATH: /var/feed_db/photos/
        #   PHOTO_AUTH_TOKEN: ${{ secrets.PHOTO_AUTH_TOKEN }}
        steps:
            - uses: actions/checkout@v6
            # DB
            - name: setup db dir
              if: ${{ github.event.action != 'closed' && github.event.pull_request.draft == false }}
              run: |
                  mkdir -p ${DB_DIR}
                  cp -n /var/feed_db/feed_db.sqlite3 ${DB_DIR}/feed_db.sqlite3
            # ADMIN
            - name: build admin
              if: ${{ github.event.action != 'closed' && github.event.pull_request.draft == false }}
              run: |
                  docker compose -f docker-compose.opensearch.yml -p $PROJECT_NAME build \
                    --build-arg NEW_API_URL=/feedapi/v1 \
                    --build-arg SYNC_URL=https://agreemod-dev.insomniafest.ru/api/v1/feeder/ \
                    --build-arg SYNC_LOGIN=${{ secrets.SYNC_LOGIN }} \
                    --build-arg SYNC_PASSWORD=${{ secrets.SYNC_PASSWORD }}
            - name: stop feed_admin
              run: docker compose -f docker-compose.opensearch.yml -p $PROJECT_NAME down
            - name: run admin
              if: ${{ github.event.action != 'closed' && github.event.pull_request.draft == false }}
              run: |
                  ALLOWED_HOSTS=1${{ github.event.number }}.feedapp-dev.insomniafest.ru,localhost DB_DIR=${DB_DIR} PHOTO_STORAGE_PATH=${PHOTO_STORAGE_PATH} PHOTO_AUTH_TOKEN=${PHOTO_AUTH_TOKEN} DISABLE_CRON=True SKIP_BACK_SYNC=True PHOTO_DOWNLOAD_LIMIT=0 PORT=1${{ github.event.number }} docker compose -f docker-compose.pr.yml -p $PROJECT_NAME up -d --remove-orphans --force-recreate
            - name: Create app link
              if: ${{ github.event.action != 'closed' && github.event.pull_request.draft == false }}
              id: create-link
              run: echo "app_url=https://1${{ github.event.number }}.feedapp-dev.insomniafest.ru" >> "$GITHUB_OUTPUT"
            - name: remove db dir
              if: ${{ github.event.action == 'closed' || github.event.pull_request.draft == true }}
              run: |
                  rm -r ${DB_DIR}

            # CLEANUP
            - name: cleanup docker containers
              run: docker container prune --filter "until=168h" -f
            - name: cleanup docker images
              run: docker image prune -a -f --filter "until=168h"
            - name: cleanup docker build cache
              run: docker builder prune -a -f --filter "until=168h"

    tests:
        needs: build
        if: ${{ github.event.action != 'closed' && github.event.pull_request.draft == false }}
        runs-on: [self-hosted, insom-devserv]
        steps:
            - uses: actions/checkout@v6
            #       - name: Checkout base branch
            #         uses: actions/checkout@v6
            #         with:
            #           ref: ${{ github.event.pull_request.base.ref }}
            #           path: base
            #           fetch-depth: 0

            #       - name: Checkout PR branch
            #         uses: actions/checkout@v6
            #         with:
            #           ref: ${{ github.head_ref }}
            #           path: pr
            #           fetch-depth: 0

            #       - name: Merge PR into base
            #         run: |
            #           cd base
            #           git fetch ../pr HEAD
            #           git merge --no-ff --no-commit FETCH_HEAD
            #         continue-on-error: false

            - name: ⌛ Do Testing
              env:
                  FEED_APP_HOST: https://1${{ github.event.number }}.feedapp-dev.insomniafest.ru
                  COMPOSE_PROJECT_NAME: feed-pr-${{ github.event.number }}-tests
              run: |
                  cd tests
                  echo $FEED_APP_HOST
                  bash run_tests.sh

            - name: Cleanup regress docker compose
              if: always()
              env:
                  COMPOSE_PROJECT_NAME: feed-pr-${{ github.event.number }}-tests
              run: |
                  cd tests
                  docker compose down --remove-orphans --volumes

            - name: 🍏 Shorter Log
              if: always()
              run: cat /tmp/tests.short.log
