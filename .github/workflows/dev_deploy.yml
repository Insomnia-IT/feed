name: Deploy to devsrv

on:
  workflow_dispatch:
  push:
   branches: [ main ]
# workflow_dispatch:

concurrency:
  group: dev-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: [self-hosted, insom-devserv]
    env:
      PROJECT_NAME: feed-dev
      DB_DIR: /var/feed_db
      PHOTO_STORAGE_PATH: /var/feed_db/photos/
      PHOTO_AUTH_TOKEN: ${{ secrets.PHOTO_AUTH_TOKEN }}
      OPEN_SEARCH_PASSWORD: ${{ secrets.OPEN_SEARCH_PASSWORD }}
      OPEN_SEARCH_USER_NAME: ${{ secrets.OPEN_SEARCH_USER_NAME }}
    steps:
    - uses: actions/checkout@v6
# DB
    - name: setup db dir
      run: mkdir -p ${DB_DIR}
# ADMIN
    - name: build admin
      run: |
          docker compose -f docker-compose.opensearch.yml -p $PROJECT_NAME build \
            --build-arg NEW_API_URL=/feedapi/v1 \
            --build-arg SYNC_URL=https://agreemod-dev.insomniafest.ru/api/v1/feeder/ \
            --build-arg SYNC_LOGIN=${{ secrets.SYNC_LOGIN }} \
            --build-arg SYNC_PASSWORD=${{ secrets.SYNC_PASSWORD }}
    - name: stop feed_admin
      run: docker compose -f docker-compose.opensearch.yml down
    - name: run admin
      run: |
        DB_DIR=${DB_DIR} PHOTO_STORAGE_PATH=${PHOTO_STORAGE_PATH} PHOTO_AUTH_TOKEN=${PHOTO_AUTH_TOKEN} SKIP_BACK_SYNC=False PORT=8888 docker compose -f docker-compose.opensearch.yml -p $PROJECT_NAME up -d --remove-orphans --force-recreate
# CLEANUP
    - name: cleanup docker containers
      run: docker container prune --filter "until=168h" -f
    - name: cleanup docker images
      run: docker image prune -a -f --filter "until=168h"
    - name: cleanup docker build cache
      run: docker builder prune -a -f --filter "until=168h"
