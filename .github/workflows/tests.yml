name: Tests

on:
  workflow_dispatch:
#   push:
#     branches: [main]

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest

    container:
      image: ubuntu:latest
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ⌛ Do Testing
        env:
          FEED_APP_HOST: https://feedapp-dev.insomniafest.ru 
        run: |
          cd tests
          bash run_tests.sh

      - name: 🍏 Shorter Log
        if: always()
        run: cat /tmp/tests.short.log
