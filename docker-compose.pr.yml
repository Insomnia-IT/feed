name: feed

services:
    backend:
        networks:
            - internal
        build:
            context: .
            dockerfile: Dockerfile_backend
            args:
                SYNC_URL:
                SYNC_LOGIN:
                SYNC_PASSWORD:
        restart: always
        environment:
            SKIP_BACK_SYNC: ${SKIP_BACK_SYNC:-False}
            DISABLE_CRON: ${DISABLE_CRON:-False}
            PHOTO_DOWNLOAD_LIMIT: ${PHOTO_DOWNLOAD_LIMIT:-100}
            PHOTO_AUTH_TOKEN: ${PHOTO_AUTH_TOKEN}
            ALLOWED_HOSTS: ${ALLOWED_HOSTS}
            CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
        volumes:
            - ${DB_DIR:-./db}:/app/db
            - ${PHOTO_STORAGE_PATH:-./db/photos}:/app/photos
        healthcheck:
            test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/ready >/dev/null || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 6
            start_period: 30s

    front:
        networks:
            - internal
        build:
            context: .
            dockerfile: ./Dockerfile_front
            args:
                NEW_API_URL: /feedapi/v1
        restart: always
        ports:
            - ${PORT:-80}:80
        depends_on:
            - backend
        healthcheck:
            test: ["CMD-SHELL", "wget -q -O - http://localhost/healthz >/dev/null || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 6
            start_period: 10s

networks:
    internal:
