version: '3.5'
name: feed

services:
  backend:
    platform: linux/amd64
    build:
      context: ../backend
      dockerfile: Dockerfile
    entrypoint: ["/bin/bash", "/tmp/entrypoint.sh"]
    container_name: feed_backend
    ports:
      - 8000:8000
      - 5678:5678
    env_file:
      - ../backend/.env.sample
    volumes:
      - ../db/:/db
      - ../backend/:/app
      - ./entrypoint.sh:/tmp/entrypoint.sh:ro
    stdin_open: true
    tty: true
    networks:
      - feed-network
  admin:
    platform: linux/amd64
    build:
      context: ../
      dockerfile: ./local-dev/Dockerfile_front
    command: sh -c "cd ./packages/admin && npm run dev -- --host"
    container_name: feed_admin
    ports:
      - 3002:3002
    volumes:
      - ../packages/admin/:/app/packages/admin
    networks:
      - feed-network

  # chrome:
  #   image: selenium/standalone-chromium:143.0
  #   container_name: feedtests_chrome
  #   ports:
  #     - 4444:4444
  #   hostname: chrome
  #   privileged: true
  #   shm_size: 2g
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
  #     interval: 15s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 15s
  #   networks:
  #     - feed-network
  tests:
    build:
      context: ../tests
      dockerfile: Dockerfile
    container_name: feedtests
    deploy:
      resources:
        limits:
          cpus: '2.0'      # Playwright нужно больше CPU
          memory: 4G       # Минимум 4GB для стабильной работы
        reservations:
          cpus: '1.0'
          memory: 2G
    shm_size: 2gb
    environment:
      # WEBDRIVER_REMOTE: true
      FEED_APP_HOST: http://localhost:3002
    volumes:
      - ../tests/:/app
    working_dir: /app
    network_mode: host
    stdin_open: true
    tty: true
    depends_on:
      backend:
        condition: service_started
    # networks:
    #   - feed-network

networks:
  feed-network:
    driver: bridge
